find_entity_references:
  name: Find Entity References
  description: Scan supported configs and show where an entity ID is referenced.
  fields:
    entity_id:
      name: Entity ID
      description: The entity ID to search for (for example sensor.kitchen_temp).
      required: true
      example: sensor.kitchen_temp
      selector:
        text:

create_manual_repair:
  name: Create Manual Repair
  description: Create a repair for a provided old/new entity ID pair.
  fields:
    old_entity_id:
      name: Old Entity ID
      description: The stale entity ID currently referenced in configs.
      required: true
      example: sensor.old_name
      selector:
        text:
    new_entity_id:
      name: New Entity ID
      description: The replacement entity ID that should be written.
      required: true
      example: sensor.new_name
      selector:
        text:
